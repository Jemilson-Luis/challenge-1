<div class="container-custom-input">
  <input
    placeholder="{{detailInput.placeholder}}"
    type="{{detailInput.type}}"
    [(ngModel)]="detailInput.name"
    name="{{detailInput.name}}"
    [ngClass]=" detailInput.error && inputError "

    class="customInput"

  />
  <p *ngIf="detailInput.error" class="error-message" > {{ detailInput.error }} </p>
</div>
